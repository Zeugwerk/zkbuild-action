name: 'Zeugwerk CI/CD Action'
description: 'Build and Test a TwinCAT3 project with a Zeugwerk CI/CD server.'
branding:
  icon: 'book-open'
  color: 'gray-dark'
inputs:
  username:
    description: 'Username for authenticating with the Zeugwerk CI/CD Service. Store this as a GitHub Actions secret and reference it via secrets.ZEUGWERK_USERNAME.'
    required: true
    default: ''
  password:
    description: 'Password for authenticating with the Zeugwerk CI/CD Service. Store this as a GitHub Actions secret and reference it via secrets.ZEUGWERK_PASSWORD.'
    required: true
    default: ''
  tcversion:
    description: 'TwinCAT version to use for compiling and testing (e.g. TC3.1.4024.22). Must be available on the Zeugwerk CI/CD Server. If omitted, an available version is selected automatically.'
    required: false
    default: ''    
  platform:
    description: 'Target platform for the build (e.g. "TwinCAT RT (x64)"). Must match a platform supported by the Zeugwerk CI/CD Server.'
    required: false
    default: 'TwinCAT RT (x64)'    
  variant-build:
    description: 'Name of the PLC project variant to build. If omitted, the default variant is used. Useful when the project defines multiple variants for different hardware configurations.'
    required: false
    default: ''    
  variant-test:
    description: 'Name of the PLC project variant to use when running unit tests. Typically this is a variant configured without hardware dependencies to allow tests to run in simulation.'
    required: false
    default: ''    
  static-analysis:
    description: 'Enable TwinCAT static analysis during the build. Accepts "false" (disabled), "true" (= 'light' analysis for open source user, 'full' analysis for Zeugwerk Customers due to the Beckhoff License costs). Uses the static analysis settings defined in the .plcproj files.'
    required: false
    default: 'false'    
  installer:
    description: 'When set to "true", generates an installer package that allows the PLC to be deployed to a target system from a Windows PC.'
    required: false
    default: 'false'    
  installer-name:
    description: 'Optional name of the installer file, defaults to "Setup-<REPO_NAME> <VERSION>.exe" if not set'
    required: false
    default: ''
  workspace:
    description: 'Path to the directory containing the .Zeugwerk folder. Use this when your project is not located at the repository root (e.g. "src/MyPlc/"). Defaults to the repository root "./".'
    required: false
    default: './'    
  version:
    description: 'Overrides the version number used when naming build artifacts. Accepts formats such as "1.2.3.4" or "1.2.3-alpha". If omitted, the version is derived from the latest tag on the repository.'
    required: false
    default: ''
  skip-build:
    description: 'When set to "true", skips compiling the project and producing build artifacts. Useful when you only want to run unit tests without a full build, reducing pipeline execution time.'
    required: false
    default: 'false'
  skip-test:
    description: 'When set to "true", skips compiling and executing the unit tests defined in the project. Useful for faster feedback cycles when test results are not required (e.g. on draft PRs).'
    required: false
    default: 'false'
  force-checks:
    description: 'When set to "true", forces a "Check All Objects" pass even for application PLCs (those with at least one task). By default this check is skipped for applications since "Build Solution" is sufficient.'
    required: false
    default: 'false'
  artifact-name:
    description: 'File name for the downloaded build artifact archive. Defaults to "artifact.zip". Override this to avoid collisions when multiple build jobs upload artifacts in the same workflow run.'
    required: false
    default: 'artifact.zip'
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.username }}
    - ${{ inputs.password }}
    - ${{ inputs.tcversion }}    
    - ${{ inputs.workspace }}    
    - ${{ inputs.version }}    
    - ${{ inputs.skip-build }}    
    - ${{ inputs.skip-test }}    
    - ${{ inputs.variant-build }}    
    - ${{ inputs.variant-test }}    
    - ${{ inputs.static-analysis }}
    - ${{ inputs.installer }}
    - ${{ inputs.platform }}
    - ${{ inputs.force-checks }}
    - ${{ inputs.artifact-name }}
    - ${{ inputs.installer-name }}
